<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obras Sociales - Municipalidad de La Costa</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/jpeg" href="icono.jpg">

    <!-- FUENTE MONTSERRAT -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --brand-blue: #0056b3;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: #002244;
            background: radial-gradient(ellipse at center, #2b6cb0 0%, #0d253f 70%, #06101e 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        /* ENCABEZADO Y LOGO */
        header {
            margin: 40px 0 20px;
            text-align: center;
            z-index: 10;
        }

        .logo-container {
            width: 220px;
            margin: 0 auto 15px;
        }

        .logo-img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0px 4px 10px rgba(0, 0, 0, 0.3));
        }

        header h1 {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
            margin-top: 5px;
        }

        /* BOTÓN VOLVER */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.2s ease;
            z-index: 10;
        }

        .btn-back:hover {
            background-color: #ffffff;
            color: var(--brand-blue);
        }

        /* BUSCADOR */
        .search-container {
            width: 90%;
            max-width: 1200px;
            margin-bottom: 25px;
            z-index: 10;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            outline: none;
        }

        /* GRID DE TARJETAS */
        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            z-index: 10;
        }

        .contact-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .contact-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.35);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--brand-blue);
            margin-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .info-item span.icon {
            font-size: 1rem;
            min-width: 20px;
        }

        .info-item a {
            color: var(--brand-blue);
            text-decoration: none;
            font-weight: 600;
            word-break: break-all;
        }

        .info-item a:hover {
            text-decoration: underline;
        }

        /* ANIMACIÓN DE OLAS */
        .waves-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background-repeat: repeat-x;
            transform-origin: center bottom;
        }

        .wave1 {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,0 C150,90 350,-40 500,40 C650,120 900,10 1200,40 L1200,120 L0,120 Z" fill="rgba(255, 255, 255, 0.15)"></path></svg>');
            animation: breathe 8s ease-in-out infinite alternate, waveMove 22s linear infinite;
        }

        .wave2 {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,30 C200,100 450,0 600,60 C750,120 1000,20 1200,50 L1200,120 L0,120 Z" fill="rgba(255, 255, 255, 0.25)"></path></svg>');
            animation: breathe 6s ease-in-out infinite alternate-reverse, waveMove 16s linear infinite reverse;
        }

        .wave3 {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,50 C150,110 350,30 500,80 C650,130 900,40 1200,70 L1200,120 L0,120 Z" fill="rgba(255, 255, 255, 0.35)"></path></svg>');
            animation: breathe 5s ease-in-out infinite alternate, waveMove 10s linear infinite;
        }

        @keyframes breathe {
            0% { transform: scaleY(0.85) translateY(10px); }
            100% { transform: scaleY(1.15) translateY(0px); }
        }

        @keyframes waveMove {
            0% { translate: 0 0; }
            100% { translate: -50% 0; }
        }
    </style>
</head>

        function cargarTarjetas() {
            const grid = document.getElementById('contactsGrid');
            grid.innerHTML = '';

            datosTexto.forEach(linea => {
                const partes = linea.split('/').map(p => p.trim());
                
                const nombre = partes[0] || 'Sin Nombre';
                const telefono = partes[1] || 'No disponible';
                const email = partes[2] || 'No disponible';
                const direccion = partes[3] || 'No disponible';

                const telLimpio = telefono.replace(/[^0-9+]/g, '');

                const cardHTML = `
                    <article class="contact-card">
                        <h2 class="card-title">${nombre}</h2>
                        <div class="info-list">
                            <div class="info-item">
                                <span class="icon">📞</span>
                                ${telefono !== 'No disponible' ? `<a href="tel:${telLimpio}">${telefono}</a>` : `<span>${telefono}</span>`}
                            </div>
                            <div class="info-item">
                                <span class="icon">✉️</span>
                                ${email !== 'No disponible' ? `<a href="mailto:${email}">${email}</a>` : `<span>${email}</span>`}
                            </div>
                            <div class="info-item">
                                <span class="icon">📍</span>
                                <span>${direccion}</span>
                            </div>
                        </div>
                    </article>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function filterCards() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.getElementsByClassName('contact-card');

            for (let i = 0; i < cards.length; i++) {
                const text = cards[i].innerText.toLowerCase();
                if (text.includes(input)) {
                    cards[i].style.display = "flex";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        cargarTarjetas();
    </script>
